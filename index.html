<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manu Pastor — newborn DJ</title>
    <meta name="description" content="newborn DJ learning to crawl. San Marcos Sierras → Leipzig.">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://manupastor.de/">
    <meta property="og:title" content="Manu Pastor — newborn DJ">
    <meta property="og:description" content="newborn DJ learning to crawl. San Marcos Sierras → Leipzig.">
    <meta property="og:image" content="manupastor-meme.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://manupastor.de/">
    <meta property="twitter:title" content="Manu Pastor — newborn DJ">
    <meta property="twitter:description" content="newborn DJ learning to crawl. San Marcos Sierras → Leipzig.">
    <meta property="twitter:image" content="manupastor-meme.png">

    <link rel="stylesheet" href="style.css?v=3">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎧</text></svg>">
    
    <!-- Rough font for that DIY feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&family=Permanent+Marker&family=Rubik+Mono+One&display=swap" rel="stylesheet">
</head>
<body class="cursed-body">
    <div class="neon-blobs"></div>
    <div class="strobe-overlay hidden"></div>
    <div class="reflectors hidden">
        <div class="reflector r-1"></div>
        <div class="reflector r-2"></div>
        <div class="reflector r-3"></div>
        <div class="reflector r-4"></div>
    </div>
    <main class="cursed-container">
        <header>
            <h1 class="artist-name">MANU PASTOR</h1>
            <p class="location">San Marcos Sierras &rarr; Leipzig</p>
        </header>

        <div class="meme-trigger-zone">
            <button id="press-to-dj" class="meme-stage meme-trigger" type="button" aria-label="Press the tiny decks to become a DJ.">
                <img src="manupastor-meme.png" alt="Cursed Manu Pastor DJ Meme" class="main-meme">
                <div class="deck-callout" aria-hidden="true">DO<br><span class="warning">NOT</span><br>PRESS</div>
                <div class="deck-hitbox" aria-hidden="true"></div>
                <div class="scribble-diy"></div>
            </button>
        </div>

        <nav class="cursed-links">
            <a href="https://soundcloud.com/manupastor" target="_blank" rel="noopener noreferrer" class="cursed-btn sc">LISTEN TO MY FIRST STEPS</a>
            <a href="https://instagram.com/manupastor.dj" target="_blank" rel="noopener noreferrer" class="cursed-btn ig">FOLLOW THE CRAWL</a>
            <a href="mailto:manupastor.dj@gmail.com" class="cursed-btn mail" title="yes, this is a real email somehow">BOOK THE WORLD'S SMALLEST DJ</a>
        </nav>

        <section class="game-section">
            <div id="dj-console" class="hidden">
                <div class="console-body">
                    <div class="deck deck-1"><div class="platter"></div></div>
                    <div class="mixer">
                        <div class="fader"></div>
                        <button class="fx-btn">AIRHORN</button>
                    </div>
                    <div class="deck deck-2"><div class="platter"></div></div>
                    
                    <!-- Temptation Buttons -->
                    <button class="temptation-btn b-1">BASS BOOST</button>
                    <button class="temptation-btn b-2">DROP IT</button>
                    <button class="temptation-btn b-3">PRO MODE</button>
                    <button class="temptation-btn b-4">DO NOT PRESS</button>
                </div>
                <button id="stop-dj" class="hidden">STOP THE NOISE</button>
            </div>
        </section>

        <!-- DJ DIPLOMA MODAL -->
        <div id="diploma-modal" class="modal-overlay hidden">
            <div class="modal-pulse-wrapper">
                <div class="modal-content">
                    <h2 class="congrats">CONGRATULATIONS!</h2>
                    <p class="status-msg">YOU ARE ALSO A DJ NOW</p>
                    <div class="diploma-container">
                        <img src="dj-diploma.png" alt="DJ Diploma" class="diploma-img">
                    </div>
                    <button id="ok-dj-now" class="cursed-btn">OK I AM DJ NOW</button>
                </div>
            </div>
        </div>

        <footer>
            <p class="footer-text">site also learning to crawl.</p>
            <div class="loading-bar">
                <div class="loading-fill"></div>
            </div>
        </footer>
    </main>
    <script src="script.js"></script>
</body>
</html>
